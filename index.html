<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adoção de cachorro</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>


    <div class="FormularioAdocao ">

        <h1>Formulário de Adoção</h1>
        <form>
            <label for="nome">Nome:</label>
            <input type="text" id="nome" placeholder="Digite seu nome" required>
            <br>
            <br>
            <label for="email">Email:</label>
            <input type="email" id="email" placeholder="Digite seu email">
            <br>
            <br>
            <label for="telefone">Telefone:</label>
            <input type="text" id="telefone" placeholder="47999999999">
            <br>
            <br>
            <label for="cpf">CPF:</label>
            <input type="text" id="cpf" placeholder="99999999999">
            <br>
            <br>
            <label for="idade">Idade:</label>
            <input type="text" id="idade" placeholder="18">
            <br>
            <br>
            <label for="moradia">Moradia:</label>
            <select name="moradia" id="moradia">
                <br>
                <br>
                <option value="selecione"> Selecione</option>
                <option value="casa"> Casa</option>
                <option value="apartamento"> Apartamento</option>
            </select>
            <br>
            <br>
            <label for="quintal">Possui Quintal?</label>
            <input type="radio" name="quintal" value="sim">Sim
            <input type="radio" name="quintal" value="nao">Não
            <br>
            <br>
            <label for="pet">Já teve Pet?</label>
            <input type="radio" name="pet" value="sim">Sim
            <input type="radio" name="pet" value="nao">Não
            <br>
            <br>
            <label for="horas">Quanto tempo o pet ficará sozinho (em horas?)</label>
            <input type="number" id="horas">
            <br>
            <br>
            <label for="motivo">Motivo da Adoção?</label>
            <br>
            <br>
            <textarea name="motivo" id="motivo"></textarea>
            <br>
            <br>
            <label for="permite">Permite animais? (Apartamento)</label>
            <input type="checkbox" id="permite">
            <br>
            <br>
            <label for="permite">Possui Quintal Seguro? (Casa)</label>
            <input type="checkbox" id="seguro">
            <br>
            <br>
            <label for="permite">Possui condições financeiras?</label>
            <input type="checkbox" id="financeiro">
            <br>
            <br>
            <label for="impulso">Decidiu adotar hoje:</label>
            <input type="checkbox" id="impulso">
            <br>
            <br>
            <label for="impulso">Aceito o termo: </label>
            <input type="checkbox" id="termo">
            <br>
            <br>

            <button type="submit">Enviar</button>
            
            <a href="https://sites.google.com/view/patinhascarentesjoinville">
                
                <img src="assets/viralatacerto.png" alt=""> 

</a>
        </form>

        <h3 id="resultado"> </h3>
        <script src="scripts/scripts.js"></script>
    </div>

</body>

</html>
